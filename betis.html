      <table>
        <thead>

        <tfoot>

            <td></td>

      </div>     
    </section>
    <script>

      document.querySelectorAll('table').forEach(function(tabela) {
    
        var totalJogos = 0;
        var totalGolos = 0;
        var totalAssistencias = 0;
    
        tabela.querySelectorAll('tbody tr').forEach(function(linha) {
    
          var jogos         = linha.querySelectorAll('td')[1].textContent;
          var golos         = linha.querySelectorAll('td')[2].textContent;
          var assistencias  = linha.querySelectorAll('td')[3].textContent;
    
          if (jogos !== '-')        totalJogos        += parseInt(jogos);
          if (golos !== '-')        totalGolos        += parseInt(golos);
          if (assistencias !== '-') totalAssistencias += parseInt(assistencias);
        });
    
        var colunasTfoot = tabela.querySelector('tfoot').querySelectorAll('td');
        colunasTfoot[1].textContent = totalJogos;
        colunasTfoot[2].textContent = totalGolos        === 0 ? '-' : totalGolos;
        colunasTfoot[3].textContent = totalAssistencias === 0 ? '-' : totalAssistencias;
    
      });
    
    </script>
